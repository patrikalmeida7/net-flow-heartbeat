name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite disparar manualmente

jobs:
  trigger-vps-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ping VPS webhook
        env:
          DEPLOY_URL: ${{ secrets.VPS_DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.VPS_DEPLOY_SECRET }}
        run: |
          if [ -z "$DEPLOY_URL" ] || [ -z "$DEPLOY_SECRET" ]; then
            echo "::warning::VPS_DEPLOY_URL ou VPS_DEPLOY_SECRET não configurados — pulando deploy"
            exit 0
          fi

          echo "Disparando deploy em $DEPLOY_URL"
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "$DEPLOY_URL" \
            -H "X-Deploy-Secret: $DEPLOY_SECRET" \
            --max-time 30)

          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.txt
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ Deploy disparado com sucesso"
          else
            echo "::error::Webhook retornou $HTTP_CODE"
            exit 1
          fi
