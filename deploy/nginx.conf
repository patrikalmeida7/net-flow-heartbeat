# /etc/nginx/sites-available/noc
# Rate limit pro endpoint de deploy (10 req/min)
limit_req_zone $binary_remote_addr zone=deploy_zone:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;  # troque pelo seu domínio quando tiver

    root /home/deploy/app/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — todas rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo pros assets versionados
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Webhook de deploy — proxy pro Node
    location = /__deploy {
        limit_req zone=deploy_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:9000/deploy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Deploy-Secret $http_x_deploy_secret;
        proxy_read_timeout 600s;  # deploy pode demorar
    }

    # Headers de segurança básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
